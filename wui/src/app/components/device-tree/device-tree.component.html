<div class="container">
  <div class="header">
    <div class="search-container">
      <span class="search-icon">🔍</span>
      <input 
        type="text" 
        class="search" 
        placeholder="جستجو" 
        [(ngModel)]="searchQuery">
    </div>
    <h1>درخت سازمانی</h1>
  </div>

  <div class="main">
    <div class="tree-container">
      <ng-container *ngFor="let node of getFilteredNodes(treeNodes)">
        <ng-container *ngTemplateOutlet="treeNodeTemplate; context: { $implicit: node, level: 0 }"></ng-container>
      </ng-container>
    </div>
  </div>
</div>

<ng-template #treeNodeTemplate let-node let-level="level">
  <div class="tree-node" *ngIf="shouldShowAsNode(node)">
    <div 
      class="tree-header" 
      [class.expanded]="isNodeExpanded(node.id)"
      [style.padding-right.px]="level * 20"
      (click)="toggleNode(node.id)">
      <span class="node-count">{{ getChildCount(node) }}</span>
      <span class="node-name">{{ node.name }}</span>
      <span class="node-icon">⚙️</span>
      <span class="toggle-icon" [class.expanded]="isNodeExpanded(node.id)">◀</span>
    </div>
    
    <div 
      class="tree-content" 
      [class.expanded]="isNodeExpanded(node.id)">
      <!-- Render child nodes recursively (only nodes that have children) -->
      <ng-container *ngIf="node.children">
        <ng-container *ngFor="let childNode of node.children">
          <ng-container *ngTemplateOutlet="treeNodeTemplate; context: { $implicit: childNode, level: level + 1 }"></ng-container>
        </ng-container>
      </ng-container>
      
      <!-- Render devices from child nodes that don't have children -->
      <ng-container *ngIf="node.children">
        <ng-container *ngFor="let childNode of node.children">
          <ng-container *ngIf="!shouldShowAsNode(childNode) && childNode.devices">
            <div 
              *ngFor="let device of childNode.devices"
              class="device-item" 
              [class.active]="isDeviceActive(device.id)"
              [style.padding-right.px]="(level + 1) * 20"
              (click)="onDeviceClick(device)">
              <span class="device-name">{{ device.name }}</span>
              <span class="device-icon">⚙️</span>
            </div>
          </ng-container>
        </ng-container>
      </ng-container>
      
      <!-- Render devices directly on this node if any -->
      <ng-container *ngIf="node.devices">
        <div 
          *ngFor="let device of node.devices"
          class="device-item" 
          [class.active]="isDeviceActive(device.id)"
          [style.padding-right.px]="(level + 1) * 20"
          (click)="onDeviceClick(device)">
          <span class="device-name">{{ device.name }}</span>
          <span class="device-icon">⚙️</span>
        </div>
      </ng-container>
    </div>
  </div>
</ng-template>

<div 
  class="notification" 
  [class.show]="true">
  {{ notificationMessage || 'وضعیت دستگاه بروزرسانی شد' }}
</div>
