<div class="container">
  <div class="header">
    <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" class="search" placeholder="جستجو" id="search-input">
    </div>
    <h1>جایگاه های سازمانی</h1>
    
  </div>
  <div class="main">
    <div class="tree-container">
      <div class="tree-node" *ngFor="let node of dataSource">
        <div class="tree-header" [class.expanded]="node.expanded" (click)="toggleNode(node)">
          <span class="node-name">{{ node.name }}</span>
          <span class="toggle-icon">◀</span>
        </div>
        <div class="tree-content" *ngIf="node.children?.length">
          <div class="tree-node" *ngFor="let child of node.children">
            <div class="tree-header" [class.expanded]="child.expanded" (click)="toggleNode(child)">
              <span class="node-name">{{ child.name }}</span>
              <span class="toggle-icon">◀</span>
            </div>
          </div>
        </div>
      </div>
    </div> 
  </div>
</div>
