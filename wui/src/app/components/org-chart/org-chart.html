<div class="container">
  <div class="header">
    <button (click)="openNodeDialog(null, false)" mat-raised-button color="primary"  aria-label="افزودن ریشه">
      <mat-icon>add</mat-icon> افزودن ریشه
    </button>
    <!-- <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" class="search" placeholder="جستجو" id="search-input">
    </div> -->
    <h1>جایگاه های سازمانی</h1>
    
  </div>
  <div class="main">
    <div class="tree-container">
      @if(dataSource.length === 0) {
        <div style="text-align: center;">
          <h3>هیچ جایگاهی ثبت نشده است</h3>
          <!-- <button *ngIf="dataSource.length === 0" (click)="openNodeDialog(null, false)" mat-raised-button color="primary" class="add-root-btn" aria-label="افزودن ریشه">
            <mat-icon>add</mat-icon> افزودن
          </button> -->
        </div>
      } @else {
        <ng-container *ngFor="let node of dataSource">
          <ng-container *ngTemplateOutlet="treeNodeTemplate; context: {$implicit: node}"></ng-container>
        </ng-container>
      }
    </div> 
  </div>
</div>

<ng-template #treeNodeTemplate let-node>
  <div class="tree-node">
    <div class="tree-header" [class.expanded]="node.expanded" [class.active]="node.active">
      <button mat-icon-button aria-label="افزودن" (click)="openNodeDialog(node, false)" class="action-btn">
        <mat-icon>add</mat-icon>
      </button>
      <button mat-icon-button aria-label="ویرایش" (click)="openNodeDialog(node, true)" class="action-btn">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button aria-label="حذف" (click)="deleteNode(node)" class="action-btn">
        <mat-icon>delete</mat-icon>
      </button>
      <span class="node-name" (click)="selectNode(node, $event)">{{ node.name }}</span>
      @if(node.hasChildren) {
      <span class="toggle-icon" [class.expanded]="node.expanded" (click)="toggleNode(node, $event)">◀</span>
      } @else {
        <span class="toggle-icon" style="visibility: hidden;">◀</span>
      }
      
    </div>
    <div class="tree-content" [class.expanded]="node.expanded" *ngIf="node.children?.length">
      <ng-container *ngFor="let child of node.children">
        <ng-container *ngTemplateOutlet="treeNodeTemplate; context: {$implicit: child}"></ng-container>
      </ng-container>
    </div>
  </div>
</ng-template>
