<form [formGroup]="form" (ngSubmit)="save()" class="dialog-form">
  <h2 mat-dialog-title>انتصاب کاربر به جایگاه سازمانی</h2>

  <mat-dialog-content class="dialog-content">
    <mat-form-field appearance="outline" (keyup)="search()">
      <mat-label>جستجوی کاربر</mat-label>
      <input matInput formControlName="username" required>
    </mat-form-field>
  
  <div *ngIf="searchResult && searchResult.length > 0" class="search-results-list">
    <div 
      *ngFor="let user of searchResult | slice:0:5" 
      class="search-result-box"
      [class.selected]="selectedUser && selectedUser.id === user.id"
      (click)="selectedUser = user"
      tabindex="0"
      (keydown.enter)="selectedUser = user"
    >
      <div class="user-info">
        <mat-icon class="user-avatar">person</mat-icon>
        <div class="user-details">
          <div class="user-name">{{ user.username }}</div>
        </div>
        <mat-icon *ngIf="selectedUser && selectedUser.id === user.id" color="primary" class="selected-icon">check_circle</mat-icon>
      </div>
    </div>
  </div>
</mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">انصراف</button>
    <button mat-raised-button color="primary" type="submit" [disabled]="!selectedUser">ذخیره</button>
  </mat-dialog-actions>
</form>
