<form [formGroup]="form" (ngSubmit)="save()" class="dialog-form">
  <h2 mat-dialog-title>{{ title }}</h2>

  <mat-dialog-content class="dialog-content">
    <mat-form-field appearance="outline">
      <mat-label>نام</mat-label>
      <input matInput formControlName="name" required>
      <mat-error *ngIf="form.get('name')?.hasError('required')">نام الزامی است</mat-error>
      <mat-error *ngIf="form.get('name')?.hasError('maxlength')">حداکثر ۱۲۸ کاراکتر مجاز است</mat-error>
    </mat-form-field>
  
    <mat-form-field appearance="outline">
      <mat-label>توضیحات</mat-label>
      <textarea matInput formControlName="description" rows="3"></textarea>
      <mat-error *ngIf="form.get('description')?.hasError('maxlength')">حداکثر ۱۰۲۴ کاراکتر مجاز است</mat-error>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">انصراف</button>
    <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">ذخیره</button>
  </mat-dialog-actions>
</form>
